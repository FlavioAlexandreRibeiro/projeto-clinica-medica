<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Template - Utilizar como modelo</title>
    <link rel="stylesheet" href="base.css">

     <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    header{
      background-image:url('https://images.unsplash.com/photo-1579684385127-1ef15d508118?q=80&w=1200');
      background-size:cover;
      background-position:center;
      height:300px;
    }

    nav{
      background:#0d6efd;
      padding:15px;
    }

    nav ul{
      display:flex;
      justify-content:center;
      list-style:none;
      gap:30px;
    }

    nav a{
      color:white;
      text-decoration:none;
      font-weight:bold;
    }

    main{
      padding:40px;
      background:white;
      min-height:400px;
    }

    h1{
      color:#0d6efd;
      margin-bottom:20px;
    }

    form{
      max-width:500px;
    }

    input, textarea{
      width:100%;
      padding:12px;
      margin-bottom:15px;
      border:1px solid #ccc;
      border-radius:5px;
    }

    button{
      background:#0d6efd;
      color:white;
      border:none;
      padding:12px 25px;
      cursor:pointer;
      border-radius:5px;
    }

    footer{    
      text-align:center;
      padding:20px;
    }

  </style>
</head>
<body>
    <header></header>

<nav>
  <ul>
      <li><a href="index.html" target="_blank">Página Principal</a></li>
      <li><a href="sobre.html" target="_blank">Sobre a Clínica</a></li>
          <li><a href="horario.html" target="_blank">Horário de Atendimento</a></li>
      <li><a href="contato.html" target="_blank">Contato</a></li>
    </ul>
</nav>

<main>
  <h1>Contato</h1>
  <p>Entre em contato conosco através do formulário abaixo:</p>
  <br>
  <form>
    <input type="text" placeholder="Digite seu nome">

    <input type="email" placeholder="Digite seu email">

     <input type="text" placeholder="Digite o assunto">  

    <textarea rows="5" placeholder="Digite sua mensagem"></textarea>

    <button type="submit">Enviar</button>
    <button type="reset">Limpar</button>
  </form>

  <!-- Google Maps Iframe -->
<div style="width: 100%; display: flex; justify-content: center; margin-top: 20px;">
  
  <iframe
    src="https://www.google.com/maps?q=Rua+das+Flores+123+Sao+Paulo&output=embed"
    width="500"
    height="300"
    style="border:0; border-radius: 12px;"
    allowfullscreen=""
    loading="lazy">
  </iframe>
</main>



</div>

<footer>

    <p>📍 Rua da Saúde, 123 - São Paulo</p>
    <p>📞 (11) 4000-0000</p>
    <p>✉ contato@saudeemsintonia.com.br</p>
</footer>    
</body>
</html>
